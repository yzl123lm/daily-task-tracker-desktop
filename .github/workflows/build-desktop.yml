name: Build desktop clients

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build
            artifact_glob: |
              dist/*.exe
              dist/*.blockmap
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.os }})
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jingluo-ai-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
